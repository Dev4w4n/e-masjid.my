openapi: 3.0.3
info:
  title: Masjid TV Display API
  description: API endpoints for the TV display app to retrieve content and settings
  version: 1.0.0

servers:
  - url: https://your-supabase-project.supabase.co/rest/v1
    description: Supabase REST API

security:
  - ApiKeyAuth: []

paths:
  /rpc/get_display_content:
    post:
      summary: Get top 10 display content for a masjid
      description: Retrieves the top 10 content items ranked by sponsorship amount for TV display
      operationId: getDisplayContent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                masjid_id:
                  type: string
                  format: uuid
                  description: Masjid UUID
              required:
                - masjid_id
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DisplayContentItem"
        "400":
          description: Invalid masjid ID
        "404":
          description: Masjid not found
        "500":
          description: Server error

  /rpc/get_display_settings:
    post:
      summary: Get display settings for a masjid
      description: Retrieves UI configuration settings for the TV display
      operationId: getDisplaySettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                masjid_id:
                  type: string
                  format: uuid
                  description: Masjid UUID
              required:
                - masjid_id
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisplaySettings"
        "400":
          description: Invalid masjid ID
        "404":
          description: Settings not found (will use defaults)
        "500":
          description: Server error

  /rpc/get_prayer_times:
    post:
      summary: Get prayer times for a zone and date
      description: Retrieves prayer times from cache or JAKIM API
      operationId: getPrayerTimes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                zone_code:
                  type: string
                  description: Malaysian prayer time zone code (e.g., KUL01)
                  example: "KUL01"
                prayer_date:
                  type: string
                  format: date
                  description: Date for prayer times (YYYY-MM-DD)
                  example: "2025-09-18"
              required:
                - zone_code
                - prayer_date
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrayerTimes"
        "400":
          description: Invalid zone code or date
        "404":
          description: Prayer times not available
        "500":
          description: Server error

  /rpc/get_masjid_zone:
    post:
      summary: Get prayer zone code for a masjid
      description: Retrieves the prayer time zone code for a specific masjid
      operationId: getMasjidZone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                masjid_id:
                  type: string
                  format: uuid
                  description: Masjid UUID
              required:
                - masjid_id
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  prayer_zone_code:
                    type: string
                    description: Prayer time zone code
                    example: "KUL01"
                  name:
                    type: string
                    description: Masjid name
                    example: "Masjid Al-Hidayah"
        "400":
          description: Invalid masjid ID
        "404":
          description: Masjid not found or zone not set
        "500":
          description: Server error

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: apikey

  schemas:
    DisplayContentItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique content ID
        title:
          type: string
          description: Content title in Bahasa Malaysia
          example: "Kelas Tafsir Al-Quran"
        content_type:
          type: string
          enum: [youtube, image]
          description: Type of content
        content_url:
          type: string
          format: uri
          description: YouTube URL or image URL
          example: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
        sponsorship_amount:
          type: number
          format: float
          description: Sponsorship amount in Malaysian Ringgit
          example: 250.00
        display_duration:
          type: integer
          nullable: true
          description: Display duration in seconds (for images only)
          example: 8
        ranking_score:
          type: number
          format: float
          description: Computed ranking score based on sponsorship
          example: 250.00
      required:
        - id
        - title
        - content_type
        - content_url
        - sponsorship_amount
        - ranking_score

    DisplaySettings:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Settings ID
        masjid_id:
          type: string
          format: uuid
          description: Masjid ID
        prayer_times_position:
          type: string
          enum: [top, bottom, left, right, center]
          description: Position of prayer times overlay
          default: bottom
        prayer_times_visible:
          type: boolean
          description: Whether prayer times should be displayed
          default: true
        carousel_transition_duration:
          type: integer
          description: Seconds between content transitions
          minimum: 5
          maximum: 60
          default: 10
        default_image_duration:
          type: integer
          description: Default duration for image content in seconds
          minimum: 3
          maximum: 30
          default: 8
        offline_message:
          type: string
          description: Message to display when offline
          default: "Menunggu sambungan internet..."
      required:
        - id
        - masjid_id
        - prayer_times_position
        - prayer_times_visible
        - carousel_transition_duration
        - default_image_duration
        - offline_message

    PrayerTimes:
      type: object
      properties:
        zone_code:
          type: string
          description: Prayer time zone code
          example: "KUL01"
        prayer_date:
          type: string
          format: date
          description: Date for these prayer times
          example: "2025-09-18"
        subuh:
          type: string
          pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: Subuh prayer time (HH:MM)
          example: "05:45"
        syuruk:
          type: string
          pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: Syuruk time (HH:MM)
          example: "07:05"
        zohor:
          type: string
          pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: Zohor prayer time (HH:MM)
          example: "13:15"
        asar:
          type: string
          pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: Asar prayer time (HH:MM)
          example: "16:30"
        maghrib:
          type: string
          pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: Maghrib prayer time (HH:MM)
          example: "19:20"
        isyak:
          type: string
          pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: Isyak prayer time (HH:MM)
          example: "20:35"
        hijri_date:
          type: string
          description: Hijri calendar date
          example: "15 Rabi' al-awwal 1447"
      required:
        - zone_code
        - prayer_date
        - subuh
        - syuruk
        - zohor
        - asar
        - maghrib
        - isyak

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
        code:
          type: string
          description: Error code
        details:
          type: string
          description: Additional error details
      required:
        - error
